name: "💡 Feature Request"
description: Suggest a new section, interaction, or capability
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What do you want to add?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution
    validations:
      required: true
