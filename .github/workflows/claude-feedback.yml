name: Claude Auto-Action

on:
  issues:
    types: [labeled]

jobs:
  claude-action:
    if: github.event.label.name == 'claude-action'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude action
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: node .github/scripts/claude-action.js

      - name: Read Claude summary
        id: summary
        run: |
          SUMMARY=$(cat .github/claude-summary.txt 2>/dev/null || echo "Changes applied.")
          echo "text=$SUMMARY" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/issue-${{ github.event.issue.number }}
          title: "🤖 Claude: ${{ github.event.issue.title }}"
          body: |
            ## Automated changes for issue #${{ github.event.issue.number }}

            **What Claude changed:** ${{ steps.summary.outputs.text }}

            > This PR was generated automatically by Claude based on issue feedback.
            > Review the Vercel preview before merging.

            Closes #${{ github.event.issue.number }}
          labels: "claude-generated,needs-review"
          draft: false

      - name: Comment on issue with PR link
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude has acted on this feedback\n\n**What was changed:** ${{ steps.summary.outputs.text }}\n\n**Pull Request:** ${{ steps.cpr.outputs.pull-request-url }}\n\nA Vercel preview deploy will be available on the PR shortly.`
            })

      - name: Comment if no changes made
        if: "!steps.cpr.outputs.pull-request-number"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude reviewed this feedback\n\n${{ steps.summary.outputs.text }}`
            })
