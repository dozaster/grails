<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Grails — About</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Poppins',sans-serif;background:#fff;color:#0a0a0a;display:flex;flex-direction:column;}
:root{
  --blue:#4461f2;--blue-h:#6070ff;
  --muted:#6b6b6b;--border:#e8e8e8;
  --black:#0a0a0a;--white:#ffffff;--purple:#7c5cbf;
}
/* NAV */
nav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(24px,5vw,64px);height:64px;
  background:rgba(255,255,255,0.96);
  border-bottom:1px solid var(--border);
  z-index:50;
}
.nav-logo{font-size:15px;font-weight:600;color:var(--black);text-decoration:none;letter-spacing:-.2px}
.nav-logo-img{height:44px;width:auto;display:block;filter:invert(1);}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-link:hover,.nav-link.active{color:var(--black)}
.nav-cta{font-size:13px;font-weight:600;color:var(--white);background:var(--black);padding:9px 20px;border-radius:100px;text-decoration:none;transition:background .2s}
.nav-cta:hover{background:#222}

/* MAIN CONTENT — fills remaining height, no scroll */
.page-content{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  padding:clamp(32px,5vh,64px) clamp(24px,5vw,64px) clamp(24px,4vh,48px);
  gap:clamp(24px,4vh,48px);
}

/* HERO TITLE */
.page-title{
  font-size:clamp(56px,10vw,130px);
  font-weight:800;letter-spacing:-.04em;line-height:.92;
  color:var(--black);
  flex-shrink:0;
}

/* ABOUT STATEMENT */
.about-row{
  flex-shrink:0;
}
.about-text{
  font-size:clamp(18px,2.8vw,32px);
  font-weight:600;line-height:1.3;letter-spacing:-.02em;color:var(--black);
}
.about-text .dim{color:#aaa}

/* FEES — vertically centered in remaining space */
.fees-row{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;}
.fees-header{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:clamp(16px,3vh,32px)}
.fees-grid{display:flex;gap:0;width:100%}
.fee-cell{flex:1;min-width:0}
.fee-num{
  font-size:clamp(40px,7vw,110px);
  font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--black);
  display:flex;align-items:baseline;gap:.1em;white-space:nowrap;
}
.fee-num.highlight{color:var(--purple)}
.fee-sup{font-size:.36em;font-weight:600;align-self:flex-start;padding-top:.1em}
.fee-plus{font-size:.3em;font-weight:400;color:var(--muted);align-self:flex-start;padding-top:.14em}
.fee-label{font-size:clamp(11px,1.1vw,14px);font-weight:500;color:var(--muted);margin-top:10px}
.fee-label.highlight{color:var(--purple)}

/* FOOTER */
footer{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px clamp(24px,5vw,64px);
  border-top:1px solid var(--border);
  font-size:12px;color:var(--muted);
}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--black)}

.counting{display:inline-block}
</style>
</head>

<script>
function countUp(el, delay){
  const target=+el.dataset.target, dur=1100, start=performance.now()+delay;
  function tick(now){
    if(now < start){ requestAnimationFrame(tick); return; }
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,4);
    el.textContent=Math.round(ease*target);
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
document.querySelectorAll('.counting').forEach((el,i)=>countUp(el, i*80));
</script>
