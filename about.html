<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Grails — About</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Poppins',sans-serif;background:#fff;color:#0a0a0a;overflow-x:hidden}

:root{
  --blue:#4461f2;
  --blue-h:#6070ff;
  --muted:#6b6b6b;
  --border:#e8e8e8;
  --black:#0a0a0a;
  --white:#ffffff;
  --purple:#7c5cbf;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(24px,5vw,64px);height:64px;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-size:15px;font-weight:600;color:var(--black);text-decoration:none;letter-spacing:-.2px}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-link{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-link:hover,.nav-link.active{color:var(--black)}
.nav-cta{
  font-size:13px;font-weight:600;color:var(--white);
  background:var(--black);padding:9px 20px;border-radius:100px;
  text-decoration:none;transition:background .2s;
}
.nav-cta:hover{background:#222}

/* PAGE HERO */
.page-hero{
  padding:160px clamp(24px,5vw,64px) 80px;
  border-bottom:1px solid var(--border);
}
.page-title{
  font-size:clamp(72px,12vw,160px);
  font-weight:800;letter-spacing:-.04em;line-height:.92;
  color:var(--black);
}

/* SECTION LAYOUT — label left, content right */
.section{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:0 clamp(40px,6vw,80px);
  padding:80px clamp(24px,5vw,64px);
  border-bottom:1px solid var(--border);
  align-items:start;
}
@media(max-width:680px){
  .section{grid-template-columns:1fr;gap:24px;padding:56px clamp(24px,5vw,64px)}
}
.section-label{
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);
  padding-top:8px;
}
.section-body{}

/* ABOUT INTRO */
.about-text{
  font-size:clamp(22px,3.5vw,38px);
  font-weight:600;line-height:1.3;letter-spacing:-.02em;
  color:var(--black);
}
.about-text .dim{color:#aaa}
.about-text .accent{color:var(--black)}

/* FEES COMPARISON */
.fees-section{
  padding:0 clamp(24px,5vw,64px);
  border-bottom:1px solid var(--border);
}
.fees-header{
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);
  padding:48px 0 24px;
}
.fees-grid{
  display:flex;
  gap:0;
  width:100%;
  padding-bottom:40px;
}
.fee-cell{
  flex:1;
  min-width:0;
}
.fee-num{
  /* fill the cell — font scales to ~22% of each cell's width */
  font-size:5.2vw;
  font-weight:700;letter-spacing:-.04em;
  line-height:1;color:var(--black);
  display:flex;align-items:baseline;gap:.1em;
  white-space:nowrap;
}
.fee-num.highlight{color:var(--purple)}
.fee-sup{font-size:.38em;font-weight:500;align-self:flex-start;padding-top:.12em}
.fee-plus{font-size:.34em;font-weight:400;color:var(--muted);align-self:flex-start;padding-top:.16em}
.fee-label{font-size:clamp(11px,1vw,13px);font-weight:500;color:var(--muted);margin-top:10px}
.fee-label.highlight{color:var(--purple)}

/* FOOTER */
footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px clamp(24px,5vw,64px);
  border-top:1px solid var(--border);
  font-size:12px;color:var(--muted);
}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--black)}

/* COUNT-UP */
.counting{display:inline-block}

/* INTERSECTION OBSERVER triggers */
.fade-up{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
.fade-up.visible{opacity:1;transform:none}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Grails</a>
  <div class="nav-links">
    <a class="nav-link active" href="about.html">About</a>
    <a class="nav-link" href="features.html">Features</a>
    <a class="nav-cta" href="index.html">Claim Your Spot</a>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <h1 class="page-title fade-up">About</h1>
</div>

<!-- ABOUT INTRO -->
<div class="section">
  <div class="section-label">About</div>
  <div class="section-body">
    <p class="about-text fade-up">
      <span class="dim">A marketplace designed for </span><span class="accent">verified ownership,
      seamless resale</span><span class="dim">, and enduring </span><span class="accent">artist support.</span>
    </p>
  </div>
</div>

<!-- FEES COMPARISON -->
<div class="fees-section">
  <div class="fees-header fade-up">Fees Comparison</div>
  <div class="fees-grid fade-up">
    <div class="fee-cell">
      <div class="fee-num">
        <span class="counting" data-target="40">0</span>
        <span class="fee-sup">%</span>
        <span class="fee-plus">+</span>
      </div>
      <div class="fee-label">Galleries</div>
    </div>
    <div class="fee-cell">
      <div class="fee-num">
        <span class="counting" data-target="28">0</span>
        <span class="fee-sup">%</span>
        <span class="fee-plus">+</span>
      </div>
      <div class="fee-label">Auction Houses</div>
    </div>
    <div class="fee-cell">
      <div class="fee-num">
        <span class="counting" data-target="20">0</span>
        <span class="fee-sup">%</span>
        <span class="fee-plus">+</span>
      </div>
      <div class="fee-label">Online Art Markets</div>
    </div>
    <div class="fee-cell">
      <div class="fee-num highlight">
        <span class="counting" data-target="15">0</span>
        <span class="fee-sup">%</span>
      </div>
      <div class="fee-label highlight">Grails Buyer Fee</div>
    </div>
  </div>
</div>

<footer>
  <span>© 2026 Grails</span>
  <div style="display:flex;gap:24px">
    <a href="#">Contact</a>
    <a href="#">Terms</a>
  </div>
</footer>

<script>
/* Intersection observer — fade-up + count-up trigger */
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(!e.isIntersecting)return;
    e.target.classList.add('visible');
    /* trigger counters inside this element */
    e.target.querySelectorAll('.counting').forEach(el=>countUp(el));
    io.unobserve(e.target);
  });
},{threshold:.15});
document.querySelectorAll('.fade-up').forEach(el=>io.observe(el));

function countUp(el){
  const target=+el.dataset.target;
  const dur=900;
  const start=performance.now();
  function tick(now){
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(ease*target);
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
